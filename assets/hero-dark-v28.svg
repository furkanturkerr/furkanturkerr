  <text x="58" y="224" fill="#AEBCCC" font-family="Inter,Segoe UI,Arial,sans-serif"
        font-size="27" font-weight="500">
    ASP.NET Core, Angular ve yapay zekâ entegrasyonları.
  </text>

  <circle cx="1194" cy="67" r="5" fill="#54D6FF">
