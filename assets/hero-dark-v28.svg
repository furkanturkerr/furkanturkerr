  </defs>

  <rect x="2" y="2" width="1276" height="268" rx="28" fill="url(#bg)" stroke="#294158" stroke-width="2"/>

  <line x1="58" y1="27" x2="1222" y2="27" stroke="#182C3F" stroke-width="2"/>
  <g clip-path="url(#topTrack)">
    <rect x="-180" y="25" width="170" height="4" rx="2" fill="#54D6FF">
      <animate attributeName="x" values="-180;1222" dur="11s" repeatCount="indefinite"/>
